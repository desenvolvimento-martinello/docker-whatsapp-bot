version: "3.8"

services:
  evolution:
    image: atendai/evolution-api:latest
    container_name: evolution_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - AUTHENTICATION_API_KEY=MINHA_APIKEY_FORTE_123
      - LOG_LEVEL=ERROR
    volumes:
      - evolution_data:/evolution

volumes:
  evolution_data: